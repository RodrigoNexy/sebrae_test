# Nome fixo do projeto → imagens tipo testeseabre-laravel, rede testeseabre_default
name: testeseabre

services:
  laravel:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: testeseabre-laravel
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "http://localhost:${APP_PORT:-8000}"
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: "lax"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE:-laravel}"
      DB_USERNAME: "${DB_USERNAME:-laravel}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: testeseabre-db
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
      MYSQL_USER: "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  mysql_data:
